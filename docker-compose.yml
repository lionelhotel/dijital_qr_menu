services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: qr_menu
      POSTGRES_USER: qr_menu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-database-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://qr_menu:${POSTGRES_PASSWORD:-change-this-database-password}@postgres:5432/qr_menu?schema=public
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      ADMIN_PATH: ${ADMIN_PATH:-/admin}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-long-random-secret}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-change-me-before-production}
      RUN_SEED: ${RUN_SEED:-true}
      UPLOAD_DIR: /app/storage/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-4}
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/storage/uploads

volumes:
  postgres_data:
  uploads:
